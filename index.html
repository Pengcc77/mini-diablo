<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Minimal Darklike Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="hud">
      <div class="hud-top">
        <div class="hud-stat">
          <span class="hud-label">LV</span>
          <span id="levelValue">1</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">HP</span>
          <span id="hpValue">100 / 100</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">SCORE</span>
          <span id="scoreValue">0</span>
        </div>
      </div>

      <div class="hud-exp">
        <div class="xp-meta">
          <span id="xpValue">0 / 20</span>
          <span class="desktop-hint">WASD Move / Space Attack</span>
          <span class="mobile-hint">Move / Attack</span>
        </div>
        <div class="xp-bar">
          <div id="xpFill" class="xp-fill"></div>
        </div>
      </div>
    </header>

    <section class="arena-frame" id="arenaFrame">
      <canvas id="gameCanvas" width="960" height="540" aria-label="2D darklike game"></canvas>

      <div class="mobile-controls" aria-hidden="true">
        <div id="joystickArea" class="joystick-area">
          <div id="joystickBase" class="joystick-base">
            <div id="joystickThumb" class="joystick-thumb"></div>
          </div>
        </div>

        <button id="attackButton" class="attack-button" type="button" aria-label="Attack">
          Attack
        </button>
      </div>

      <div id="gameOverPanel" class="overlay hidden">
        <div class="overlay-card">
          <h1>Game Over</h1>
          <p id="finalScore">Final Score: 0</p>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </div>

      <div id="levelUpPanel" class="overlay hidden">
        <div class="overlay-card overlay-card-large">
          <h1>Level Up</h1>
          <p>Choose one upgrade and continue the run.</p>
          <div id="upgradeOptions" class="upgrade-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
