<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mini Diablo Survivor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header id="gameHud" class="hud">
      <div class="hud-top">
        <div class="hud-stat">
          <span class="hud-label">LV</span>
          <span id="levelValue">1</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">HP</span>
          <span id="hpValue">130 / 130</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">SCORE</span>
          <span id="scoreValue">0</span>
        </div>
      </div>

      <div class="hud-bottom">
        <div class="hud-mini">
          <span id="timeValue">00:00</span>
          <span class="hud-dot"></span>
          <span id="killsValue">K 0</span>
          <span class="hud-dot"></span>
          <span id="phaseValue">Phase 1</span>
        </div>
        <div class="xp-row">
          <span id="xpValue">0 / 14</span>
          <div class="xp-bar">
            <div id="xpFill" class="xp-fill"></div>
          </div>
        </div>
      </div>
    </header>

    <section class="arena-frame" id="arenaFrame">
      <canvas id="gameCanvas" width="960" height="540" aria-label="2D survivor game"></canvas>

      <div id="mobileHint" class="mobile-hint-overlay">
        Drag to move / Auto attack
      </div>

      <div class="mobile-controls" aria-hidden="true">
        <div id="joystickArea" class="joystick-area">
          <div id="joystickBase" class="joystick-base">
            <div id="joystickThumb" class="joystick-thumb"></div>
          </div>
        </div>

        <button id="attackButton" class="skill-button" type="button" aria-label="Skill button"></button>
      </div>

      <div id="gameOverPanel" class="overlay hidden">
        <div class="overlay-card">
          <h1>戰鬥結束</h1>
          <p id="finalLevel">等級：1</p>
          <p id="finalScore">分數：0</p>
          <p id="finalTime">存活：00:00</p>
          <p id="finalKills">擊殺：0</p>
          <p id="finalBuild">流派：平衡流</p>
          <p id="finalUpgrades">主要強化：-</p>
          <button id="restartButton" type="button">再來一局</button>
        </div>
      </div>

      <div id="levelUpPanel" class="overlay hidden">
        <div class="overlay-card overlay-card-large">
          <h1>等級提升</h1>
          <p>選擇一個強化效果</p>
          <div id="upgradeOptions" class="upgrade-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
